<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>孫の手の森</title>
    <meta
      name="description"
      content="孫の手の森は、日々の作業を少しだけ助けるツールの情報ページです。"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <div class="topbar">
        <p class="eyebrow"><a class="brand-link" href="./">孫の手の森</a></p>
        <nav class="language-switch" aria-label="言語切り替え">
          <a href="../">English</a>
          <span>/</span>
          <span class="current">日本語</span>
        </nav>

      <header class="hero">
        <h1>孫の手の森</h1>
        <p class="hero-copy">
          このサイトでは、ツールの概要、サポート情報、プライバシーポリシーをまとめています。
        </p>
      </header>

      <main class="content-grid">
        <section class="card app-card">
          <p class="card-kicker">公開中のアプリ</p>
          <h2>ClipStack</h2>

            コピーしたテキスト、リンク、画像を再利用しやすくする

          </p>
          <div class="card-actions">
            <a class="button" href="./clipstack/">アプリページを見る</a>
            <a class="text-link" href="./clipstack/support/">サポート</a>
            <a class="text-link" href="./clipstack/privacy/">プライバシー</a>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="nav-links">
          <span>n9fordev</span>
        </div>
        <p>© 2026 n9fordev. All rights reserved.</p>
